# Promotes the consolidated `Nfs` umbrella package from the GitHub Packages feed to nuget.org
# using NuGet trusted publishing (OIDC, no long-lived API key). The `Nfs` package bundles every
# Nfs.* assembly, so only this one package is published to nuget.org; the granular Nfs.* packages
# remain on GitHub Packages for fine-grained/internal consumption.
#
# Prerequisites (one-time, owner action — not automatable here):
#   1. nuget.org -> Account -> Trusted Publishing -> Add policy:
#        Repository Owner: marcschier
#        Repository:       nfs
#        Workflow File:    nuget.yml
#        Environment:      release
#   2. GitHub repo -> Settings -> Environments -> New environment "release",
#      add an environment secret NUGET_USER = your nuget.org profile name (NOT email).
#   3. The `Nfs` package must already exist on the GitHub Packages feed (the ci.yml
#      `publish-github` job pushes it on a `v*` tag).
name: Publish to NuGet.org

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to promote from the GitHub feed (blank = latest on the feed)."
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: nuget-publish
  cancel-in-progress: false

jobs:
  promote:
    name: promote GitHub Packages -> nuget.org
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      packages: read
      id-token: write # Required for NuGet trusted publishing (OIDC).
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Download packages from the GitHub Packages feed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          mkdir -p promote
          # Discover the flat-container (PackageBaseAddress) resource from the service index.
          base=$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" \
            https://nuget.pkg.github.com/marcschier/index.json \
            | jq -r '.resources[] | select(."@type"|test("^PackageBaseAddress")) | ."@id"')
          base="${base%/}"
          echo "PackageBaseAddress: $base"
          # Promote only the consolidated `Nfs` umbrella package (it bundles every Nfs.* assembly,
          # so the granular packages stay on GitHub Packages and are not published to nuget.org).
          id="Nfs"
          idl=$(echo "$id" | tr '[:upper:]' '[:lower:]')
          versions=$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" "$base/$idl/index.json" | jq -r '.versions[]')
          if [ -n "${INPUT_VERSION}" ]; then
            ver="${INPUT_VERSION}"
          else
            ver=$(echo "$versions" | tail -n 1)
          fi
          verl=$(echo "$ver" | tr '[:upper:]' '[:lower:]')
          echo "Downloading $id $ver"
          curl -fsSL -H "Authorization: Bearer $GH_TOKEN" \
            "$base/$idl/$verl/$idl.$verl.nupkg" -o "promote/$id.$ver.nupkg"
          echo "Packages to promote:"
          ls -l promote

      - name: Guard — ensure only the Nfs umbrella is staged
        run: |
          set -euo pipefail
          shopt -s nullglob
          pkgs=(promote/*.nupkg)
          if [ "${#pkgs[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one package (the Nfs umbrella) to promote, found ${#pkgs[@]}:"
            ls -1 promote/ || true
            exit 1
          fi
          name=$(basename "${pkgs[0]}")
          # The umbrella file is `Nfs.<version>.nupkg`; granular packages are `Nfs.Client.<version>.nupkg` etc.
          # Requiring a digit right after `Nfs.` excludes every granular package id.
          if ! echo "$name" | grep -Eq '^Nfs\.[0-9].*\.nupkg$'; then
            echo "::error::Staged package '$name' is not the Nfs umbrella; refusing to publish to nuget.org."
            exit 1
          fi
          echo "Guard OK: promoting only '$name' to nuget.org."

      - name: NuGet login (OIDC)
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }} # nuget.org profile name, NOT email.

      - name: Push to nuget.org
        run: >
          dotnet nuget push "promote/*.nupkg"
          --source https://api.nuget.org/v3/index.json
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --skip-duplicate
